<!DOCTYPE html>
<html lang="ga">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cúntóir AI Gaeilge</title>
<!-- Leagan 0.02 -->
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --grey: #C0C0C0;
    --grey-dark: #808080;
    --grey-darker: #606060;
    --navy: #000080;
    --white: #FFFFFF;
  }

  body {
    background: #008080;
    font-family: "MS Sans Serif", "Segoe UI", Tahoma, sans-serif;
    font-size: 13px;
    color: #000;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    padding: 16px;
  }

  .window {
    background: var(--grey);
    border: 2px solid;
    border-color: var(--white) var(--grey-dark) var(--grey-dark) var(--white);
    box-shadow: 1px 1px 0 1px #000;
    width: 100%;
    max-width: 620px;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }

  .title-bar {
    background: var(--navy);
    color: var(--white);
    font-weight: bold;
    padding: 3px 8px;
    display: flex;
    align-items: center;
    user-select: none;
  }

  .body {
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex: 1;
    min-height: 0;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  label.lbl { white-space: nowrap; }
  .bold { font-weight: bold; }

  /* Win95 raised controls */
  button, select {
    font-family: inherit;
    font-size: 13px;
    color: #000;
    background: var(--grey);
    border: 2px solid;
    border-color: var(--white) var(--grey-dark) var(--grey-dark) var(--white);
    padding: 4px 10px;
    cursor: pointer;
  }
  button:hover:not(:disabled) { background: #b8b8b8; }
  button:active:not(:disabled) {
    border-color: var(--grey-dark) var(--white) var(--white) var(--grey-dark);
    background: #a8a8a8;
  }
  button:disabled { color: var(--grey-dark); cursor: default; }

  select { padding: 3px 4px; }

  /* Win95 sunken inputs */
  input[type="text"], input[type="password"], textarea, .inset {
    font-family: inherit;
    font-size: 13px;
    color: #000;
    background: var(--white);
    border: 2px solid;
    border-color: var(--grey-dark) var(--white) var(--white) var(--grey-dark);
    padding: 4px;
  }
  textarea { resize: none; width: 100%; }

  .flex1 { flex: 1; }

  /* Mic meter */
  .meter {
    flex: 1;
    height: 14px;
    background: var(--grey-dark);
    border: 2px solid;
    border-color: var(--grey-dark) var(--white) var(--white) var(--grey-dark);
    position: relative;
    overflow: hidden;
  }
  .meter-fill {
    position: absolute; left: 0; top: 0; bottom: 0;
    width: 0%;
    background: var(--navy);
    transition: width 0.05s;
  }

  .history {
    background: var(--white);
    border: 2px solid;
    border-color: var(--grey-dark) var(--white) var(--white) var(--grey-dark);
    height: 260px;
    overflow-y: auto;
    padding: 6px;
    white-space: pre-wrap;
    word-wrap: break-word;
    line-height: 1.5;
    user-select: text;
  }
  .msg-user { color: var(--navy); font-weight: bold; }
  .msg-ai { color: #000; }

  .transcript {
    background: var(--white);
    border: 2px solid;
    border-color: var(--grey-dark) var(--white) var(--white) var(--grey-dark);
    min-height: 30px;
    max-height: 60px;
    overflow-y: auto;
    padding: 4px 6px;
  }

  .status {
    background: var(--grey);
    border-top: 2px solid var(--grey-dark);
    padding: 1px 8px;
    font-size: 11px;
    line-height: 1.3;
    min-height: 0;
  }

  .seol-btn {
    padding: 4px 8px;
    min-width: 52px;
    font-size: 12px;
  }

  .seiceail-area { display: none; }
  .seiceail-area.show { display: flex; flex-direction: column; gap: 4px; }

  .hidden { display: none !important; }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.3);
    justify-content: center;
    align-items: center;
    z-index: 100;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--grey);
    border: 2px solid;
    border-color: var(--white) var(--grey-dark) var(--grey-dark) var(--white);
    box-shadow: 2px 2px 0 1px #000;
    width: 320px;
  }
  .modal .title-bar { justify-content: space-between; }
  .modal-body { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .modal-status { color: #a00000; font-size: 12px; min-height: 16px; }

  /* Right-click menu */
  .ctx-menu {
    position: fixed;
    background: var(--grey);
    border: 2px solid;
    border-color: var(--white) var(--grey-dark) var(--grey-dark) var(--white);
    box-shadow: 2px 2px 0 1px #000;
    z-index: 200;
    display: none;
  }
  .ctx-menu.show { display: block; }
  .ctx-menu div {
    padding: 5px 18px;
    cursor: pointer;
    white-space: nowrap;
  }
  .ctx-menu div:hover { background: var(--navy); color: var(--white); }

  @media (max-width: 640px) {
    body { padding: 0; }
    .window { max-width: none; min-height: 100vh; }

    /* Let the message box grow to fill the screen's spare height,
       so there's no wasted grey area at the bottom on phones. */
    .msg-row {
      flex: 1 1 auto;
      min-height: 120px;
      display: flex;
    }
    .msg-row #messageEdit {
      flex: 1;
      height: auto;
      align-self: stretch;
    }

    /* Keep history a fixed, scrollable size so the message box is the
       element that absorbs the extra space. */
    .history {
      height: 200px;
      flex: 0 0 auto;
    }
  }
</style>
</head>
<body>

<div class="window">
  <div class="title-bar">Cúntóir AI Gaeilge</div>
  <div class="body">

    <!-- Conversation row -->
    <div class="row">
      <label class="lbl">Comhrá:</label>
      <select id="convoSelect" class="flex1"></select>
      <button id="newConvoBtn" title="Comhrá nua (Ctrl+N)">Nua</button>
    </div>

    <!-- AI + voice row -->
    <div class="row">
      <label class="lbl">AI:</label>
      <select id="aiSelect">
        <option value="Gemini">Gemini</option>
        <option value="Abair COMHRÁ">Abair COMHRÁ</option>
      </select>
      <label class="lbl">Glór:</label>
      <select id="voiceSelect" class="flex1"></select>
    </div>

    <!-- Button row -->
    <div class="row">
      <button id="recordBtn" class="flex1">Tosaigh ag Taifeadadh</button>
      <button id="seiceailBtn">Seiceáil Théacs: OFF</button>
      <button id="settingsBtn">Socruithe</button>
    </div>

    <!-- Secondary button row -->
    <div class="row">
      <button id="stopAudioBtn" class="flex1" title="Seinn/stop an fhuaim">Seinn an Teachtaireacht is Déanaí</button>
      <button id="seolBtn" class="seol-btn" disabled>Seol</button>
      <button id="downloadBtn" title="Íoslódáil an comhrá reatha mar théacs">Íoslódáil</button>
    </div>

    <!-- Mic meter -->
    <div class="row">
      <label class="lbl">Mic:</label>
      <div class="meter"><div class="meter-fill" id="meterFill"></div></div>
    </div>

    <!-- Message box -->
    <div class="bold">Teachtaireacht:</div>
    <div class="row msg-row" style="align-items: stretch;">
      <textarea id="messageEdit" class="flex1" rows="3"
        placeholder="Scríobh anseo, nó úsáid an micreafón..."></textarea>
    </div>

    <!-- History -->
    <div class="bold">Stair Comhraithe:</div>
    <div class="history" id="historyBox"></div>

  </div>
  <div class="status" id="statusBar">Ag lódáil...</div>
</div>

<!-- Settings modal -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <div class="title-bar">Socruithe — Eochair API</div>
    <div class="modal-body">
      <div style="font-size:12px;">
        Chun Gemini a úsáid, cuir isteach d'eochair API Google.
        Faigh saor in aisce í ag aistudio.google.com.
        Fanann an eochair i do bhrabhsálaí féin amháin.
      </div>
      <label class="lbl">Eochair Gemini:</label>
      <input type="password" id="geminiKey" placeholder="AIza...">
      <div class="row">
        <button id="saveSettingsBtn" class="flex1">Sábháil</button>
        <button id="closeSettingsBtn" class="flex1">Dún</button>
      </div>
      <div class="modal-status" id="settingsStatus"></div>
    </div>
  </div>
</div>

<!-- Rename modal -->
<div class="modal-overlay" id="renameModal">
  <div class="modal">
    <div class="title-bar">Athainmnigh an comhrá</div>
    <div class="modal-body">
      <input type="text" id="renameInput">
      <div class="modal-status" id="renameStatus"></div>
      <div class="row">
        <button id="renameOkBtn" class="flex1">OK</button>
        <button id="renameCancelBtn" class="flex1">Cealaigh</button>
      </div>
    </div>
  </div>
</div>

<!-- Delete modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="title-bar">Scrios an comhrá</div>
    <div class="modal-body">
      <div id="deleteMsg"></div>
      <div class="row">
        <button id="deleteOkBtn" class="flex1">Scrios</button>
        <button id="deleteCancelBtn" class="flex1">Cealaigh</button>
      </div>
    </div>
  </div>
</div>

<!-- Right-click context menu -->
<div class="ctx-menu" id="ctxMenu"></div>

<script src="app.js?v=0.02"></script>
</body>
</html>
